<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1a2e"/>
      <stop offset="100%" style="stop-color:#161323"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5b5"/>
      <stop offset="50%" style="stop-color:#c4935a"/>
      <stop offset="100%" style="stop-color:#a38050"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background: rounded square in deep plum -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle gold border -->
  <rect width="508" height="508" x="2" y="2" rx="94" ry="94" fill="none" stroke="#c4935a" stroke-opacity="0.15" stroke-width="2"/>
  <!-- Four-pointed star in gold with glow -->
  <g filter="url(#glow)" transform="translate(256,256)">
    <ellipse cx="0" cy="0" rx="48" ry="150" fill="url(#gold)"/>
    <ellipse cx="0" cy="0" rx="150" ry="48" fill="url(#gold)"/>
    <circle cx="0" cy="0" r="32" fill="#e8d5b5" opacity="0.6"/>
  </g>
</svg>
